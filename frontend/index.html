<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RPG Engine - Advanced Visuals</title>
    <style>
        /* MODERN DARK THEME */
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --health-bg: #334155;
            --health-fill: #ef4444;
            --text-main: #f8fafc;
            --accent: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 { margin-top: 20px; font-weight: 300; letter-spacing: 2px; }

        /* BATTLE ARENA LAYOUT */
        .arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 80%;
            max-width: 900px;
            height: 350px;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 80%);
            border: 1px solid #334155;
            border-radius: 12px;
            margin: 20px 0;
            padding: 40px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* CHARACTER CARDS */
        .character {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 200px;
            position: relative;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: var(--panel-bg);
            border: 2px solid #475569;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        /* HEALTH BAR STYLING */
        .stats { width: 100%; text-align: center; margin-top: 15px; }
        .stats h2 { margin: 0 0 5px 0; font-size: 1.2rem; }
        .stats p { margin: 0 0 5px 0; font-size: 0.9rem; color: #94a3b8; }
        
        .health-bar {
            background: var(--health-bg);
            width: 100%;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .health-fill {
            background: var(--health-fill);
            height: 100%;
            width: 100%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* CONTROL PANEL */
        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            cursor: pointer;
            background: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid #475569;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        button:active { transform: translateY(0); }

        /* COMBAT LOG */
        #combat-log {
            background: #000;
            color: #10b981;
            padding: 15px;
            border-radius: 8px;
            height: 120px;
            overflow-y: auto;
            width: 80%;
            max-width: 900px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            border: 1px solid #334155;
        }

        /* --- ANIMATIONS --- */
        
        /* The Shake effect when taking damage */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); border-color: red;}
            50% { transform: translateX(10px) rotate(5deg); }
            75% { transform: translateX(-10px) rotate(-5deg); }
            100% { transform: translateX(0); border-color: #475569;}
        }
        .hit-animation { animation: shake 0.4s ease-in-out; }

        /* Floating Damage Text */
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1.5); }
            100% { opacity: 0; transform: translateY(-50px) scale(1); }
        }
        
        .floating-text {
            position: absolute;
            color: #ef4444;
            font-weight: bold;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        .floating-heal { color: #10b981; }

    </style>
</head>
<body>

    <h1>ARENA COMBAT</h1>

    <div class="arena">
        <div class="character" id="player-container">
            <div class="floating-anchor" id="player-float-anchor" style="position:absolute; top:-20px; width:100%; text-align:center;"></div>
            <div class="avatar" id="player-avatar">🗡️</div>
            <div class="stats">
                <h2>Player</h2>
                <p>HP: <span id="player-hp">100</span> / <span id="player-max-hp">100</span></p>
                <div class="health-bar"><div class="health-fill" id="player-hp-bar"></div></div>
            </div>
        </div>

        <h1>VS</h1>

        <div class="character" id="enemy-container">
            <div class="floating-anchor" id="enemy-float-anchor" style="position:absolute; top:-20px; width:100%; text-align:center;"></div>
            <div class="avatar" id="enemy-avatar">🐉</div>
            <div class="stats">
                <h2>Enemy</h2>
                <p>HP: <span id="enemy-hp">100</span> / <span id="enemy-max-hp">100</span></p>
                <div class="health-bar"><div class="health-fill" id="enemy-hp-bar"></div></div>
            </div>
        </div>
    </div>

    <div class="actions">
        <button onclick="sendAction(1)">Attack</button>
        <button onclick="sendAction(2)">Defend</button>
        <button onclick="sendAction(3)">Heal (<span id="heal-charges">3</span>)</button>
    </div>

    <div id="combat-log"></div>

    <script>
        const API_URL = ""; 
        
        // TRACK PREVIOUS STATE FOR DIFFING (To trigger animations)
        let previousPlayerHp = 100;
        let previousEnemyHp = 100;

        async function sendAction(choiceId) {
            try {
                const response = await fetch(`${API_URL}/action`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ choice: choiceId })
                });

                const gameState = await response.json();
                updateUI(gameState);
                
            } catch (error) {
                console.error("ERROR COMMUNICATING WITH BACKEND:", error);
            }
        }

        // SPAWNS FLOATING TEXT OVER A CHARACTER
        function spawnFloatingText(anchorId, text, isHeal = false) {
            const anchor = document.getElementById(anchorId);
            const floatEl = document.createElement("div");
            floatEl.className = `floating-text ${isHeal ? 'floating-heal' : ''}`;
            floatEl.innerText = text;
            anchor.appendChild(floatEl);
            
            // CLEAN UP THE DOM AFTER ANIMATION ENDS
            setTimeout(() => floatEl.remove(), 1000);
        }

        // TRIGGERS THE CSS SHAKE EFFECT
        function triggerHitAnimation(avatarId) {
            const avatar = document.getElementById(avatarId);
            avatar.classList.remove("hit-animation"); // Reset if already shaking
            void avatar.offsetWidth; // Force DOM reflow
            avatar.classList.add("hit-animation");
        }

        function updateUI(state) {
            const newPlayerHp = Math.max(0, Math.round(state.player.hp));
            const newEnemyHp = Math.max(0, Math.round(state.enemy.hp));

            // STATE DIFFING: DID THE ENEMY TAKE DAMAGE?
            if (newEnemyHp < previousEnemyHp) {
                const damage = previousEnemyHp - newEnemyHp;
                triggerHitAnimation("enemy-avatar");
                spawnFloatingText("enemy-float-anchor", `-${damage}`);
            }

            // STATE DIFFING: DID THE PLAYER TAKE DAMAGE OR HEAL?
            if (newPlayerHp < previousPlayerHp) {
                const damage = previousPlayerHp - newPlayerHp;
                triggerHitAnimation("player-avatar");
                spawnFloatingText("player-float-anchor", `-${damage}`);
            } else if (newPlayerHp > previousPlayerHp) {
                const healAmt = newPlayerHp - previousPlayerHp;
                spawnFloatingText("player-float-anchor", `+${healAmt}`, true);
            }

            // UPDATE MEMORY FOR NEXT TURN
            previousPlayerHp = newPlayerHp;
            previousEnemyHp = newEnemyHp;

            // UPDATE HTML TEXT
            document.getElementById("player-hp").innerText = newPlayerHp;
            document.getElementById("player-max-hp").innerText = state.player.max_hp;
            document.getElementById("enemy-hp").innerText = newEnemyHp;
            document.getElementById("enemy-max-hp").innerText = state.enemy.max_hp;
            document.getElementById("heal-charges").innerText = state.player.heal_charges;

            // UPDATE HEALTH BARS
            document.getElementById("player-hp-bar").style.width = `${(newPlayerHp / state.player.max_hp) * 100}%`;
            document.getElementById("enemy-hp-bar").style.width = `${(newEnemyHp / state.enemy.max_hp) * 100}%`;

            // UPDATE LOGS
            const logBox = document.getElementById("combat-log");
            logBox.innerHTML = ""; 
            state.logs.forEach(log => {
                const logEntry = document.createElement("div");
                logEntry.innerText = `> ${log}`;
                logBox.appendChild(logEntry);
            });
            logBox.scrollTop = logBox.scrollHeight;

            if (state.game_over) {
                setTimeout(() => alert("COMBAT ENDED!"), 500);
            }
        }
    </script>
</body>
</html>
