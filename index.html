<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arena Combat</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; }
        .arena { display: flex; justify-content: space-around; margin: 50px 0; }
        .character { background: #1e1e1e; padding: 20px; border-radius: 8px; width: 30%; }
        .health-bar { background: #333; width: 100%; height: 20px; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .health-fill { background: #e74c3c; height: 100%; transition: width 0.3s ease; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #2980b9; }
        #combat-log { background: #000; padding: 15px; border-radius: 4px; height: 150px; overflow-y: auto; text-align: left; width: 80%; margin: 0 auto; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Arena Combat</h1>

    <div class="arena">
        <div class="character" id="player-card">
            <h2>Player</h2>
            <p>HP: <span id="player-hp">100</span> / <span id="player-max-hp">100</span></p>
            <div class="health-bar"><div class="health-fill" id="player-hp-bar" style="width: 100%;"></div></div>
        </div>

        <div class="character" id="enemy-card">
            <h2>Enemy</h2>
            <p>HP: <span id="enemy-hp">100</span> / <span id="enemy-max-hp">100</span></p>
            <div class="health-bar"><div class="health-fill" id="enemy-hp-bar" style="width: 100%;"></div></div>
        </div>
    </div>

    <div class="actions">
        <button onclick="sendAction(1)">Attack</button>
        <button onclick="sendAction(2)">Defend</button>
        <button onclick="sendAction(3)">Heal (<span id="heal-charges">3</span>)</button>
    </div>

    <h3>Combat Log</h3>
    <div id="combat-log"></div>

    <script>
        // CONFIGURATION: REPLACE THIS URL WITH YOUR FASTAPI CODESPACE URL ONCE IT IS RUNNING
        const API_URL = "http://localhost:8000"; 

        // FUNCTION TO SEND THE PLAYER'S CHOICE TO THE PYTHON BACKEND
        async function sendAction(choiceId) {
            try {
                // SEND AN HTTP POST REQUEST TO THE FASTAPI BACKEND
                const response = await fetch(`${API_URL}/action`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ choice: choiceId })
                });

                // PARSE THE JSON RESPONSE FROM PYTHON
                const gameState = await response.json();
                
                // UPDATE THE VISUALS BASED ON THE NEW STATE
                updateUI(gameState);
